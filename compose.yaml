name: auramaur

services:
  auramaur:
    platform: ${AURAMAUR_PLATFORM:-linux/amd64}
    image: ${AURAMAUR_IMAGE:-auramaur}:${AURAMAUR_VERSION:-local}
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.214}
    # A clean exit is deliberate (notably KILL_SWITCH); crashes restart.
    restart: on-failure
    env_file:
      - path: .env
        required: false
    environment:
      # Container deployment gates are deliberately separate from a legacy
      # workstation .env so a parallel shakedown cannot inherit live authority.
      AURAMAUR_LIVE: ${AURAMAUR_CONTAINER_LIVE:-false}
      AURAMAUR_ENABLE_TRANSFERS: ${AURAMAUR_CONTAINER_ENABLE_TRANSFERS:-false}
      AURAMAUR_STATE_DIR: /app/state
      AURAMAUR_DB_PATH: /app/state/auramaur.db
      AURAMAUR_LOG_DIR: /app/logs
      LOGGING__FILE: /app/logs/auramaur.log
      AURAMAUR_KILL_SWITCH_PATH: /app/state/KILL_SWITCH
      AURAMAUR_LOCAL_CONFIG: /app/runtime-config/defaults.local.yaml
      AURAMAUR_IBKR_HOST: ibgateway
      # The dedicated live account supplies quotes only. Auramaur execution
      # remains in its local paper ledger until the independent gates above
      # are deliberately armed at graduation.
      AURAMAUR_IBKR_ENVIRONMENT: ${IBKR_QUOTE_ENVIRONMENT:-paper}
      AURAMAUR_IBKR_PORT: ${IBKR_QUOTE_PORT:-4002}
      IBKR__HOST: ibgateway
      IBKR__ENABLED: ${IBKR_ENABLED:-true}
      IBKR__OPTIONS_ENABLED: "false"
      # Paper books reject delayed/frozen prices; request native live data.
      IBKR__MARKET_DATA_TYPE: ${IBKR_MARKET_DATA_TYPE:-1}
      IBKR__ENVIRONMENT: ${IBKR_QUOTE_ENVIRONMENT:-paper}
      IBKR__PAPER_PORT: ${IBKR_QUOTE_PORT:-4002}
      IBKR__LIVE_PORT: ${IBKR_QUOTE_PORT:-4002}
      IBKR__ETF_QUOTE_PORT: ${IBKR_QUOTE_PORT:-4002}
      IBKR__READONLY: "true"
      IBKR__PAPER_TRADE: "true"
      IBKR__MULTIASSET_PAPER_ENABLED: ${IBKR_MULTIASSET_PAPER_ENABLED:-true}
      IBKR__MULTIASSET_EXECUTION_ENABLED: ${IBKR_MULTIASSET_EXECUTION_ENABLED:-false}
      IBKR__MULTIASSET_EXECUTION_CONFIRM_LIVE: ${IBKR_MULTIASSET_EXECUTION_CONFIRM_LIVE:-false}
      IBKR__MULTIASSET_EXECUTION_BOOKS: ${IBKR_MULTIASSET_EXECUTION_BOOKS:-[]}
      IBKR__ETF_PAPER_ENABLED: ${IBKR_ETF_PAPER_ENABLED:-true}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      KALSHI_PRIVATE_KEY_PATH: /run/auramaur-kalshi-private.pem
      HOME: /home/auramaur
      AURAMAUR_RUNTIME_UID: ${AURAMAUR_UID:-1000}
      AURAMAUR_RUNTIME_GID: ${AURAMAUR_GID:-1000}
    volumes:
      - ./runtime/state:/app/state
      - ./runtime/logs:/app/logs
      - ./runtime/config:/app/runtime-config:ro
      - ${CLAUDE_CONFIG_DIR:-./runtime/claude}:/home/auramaur/.claude
      - ./secrets:/run/secrets:ro
      - ${KALSHI_PRIVATE_KEY_SOURCE:-./private-key.pem}:/run/auramaur-kalshi-private.pem:ro
    networks:
      broker:
        ipv4_address: ${AURAMAUR_BOT_IP:-172.18.0.3}
    # Local-LLM tier: reach the host's native Ollama (:11434). The endpoint
    # itself is configured via runtime defaults.local.yaml (local_llm.base_url),
    # never via env — see the local_llm section-trap note in defaults.yaml.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ibgateway
    stop_grace_period: 2m

  # Read-only dashboard over the bot's state. Same image, different command;
  # opens the DB with mode=ro and gets NO venue secrets or Kalshi key, so it
  # cannot trade or move funds even if compromised. Loopback-published only.
  auramaur-web:
    platform: ${AURAMAUR_PLATFORM:-linux/amd64}
    image: ${AURAMAUR_IMAGE:-auramaur}:${AURAMAUR_VERSION:-local}
    restart: unless-stopped
    # Web twin of the bot entrypoint: no KILL_SWITCH refusal (the dashboard
    # must stay up during a halt), no log/claude writability requirements.
    entrypoint: ["/usr/bin/tini", "--", "/usr/local/bin/auramaur-web-entrypoint.sh"]
    command: ["auramaur", "web", "--host", "0.0.0.0", "--port", "8484"]
    environment:
      # Mirror the bot's live gate so the LIVE/PAPER badge (and which book the
      # dashboard reads) agrees with what the bot is actually doing.
      AURAMAUR_LIVE: ${AURAMAUR_CONTAINER_LIVE:-false}
      AURAMAUR_STATE_DIR: /app/state
      AURAMAUR_DB_PATH: /app/state/auramaur.db
      AURAMAUR_LOG_DIR: /app/logs
      LOGGING__FILE: /app/logs/auramaur.log
      AURAMAUR_KILL_SWITCH_PATH: /app/state/KILL_SWITCH
      AURAMAUR_LOCAL_CONFIG: /app/runtime-config/defaults.local.yaml
      HOME: /home/auramaur
      AURAMAUR_RUNTIME_UID: ${AURAMAUR_UID:-1000}
      AURAMAUR_RUNTIME_GID: ${AURAMAUR_GID:-1000}
    volumes:
      # State stays rw-mounted (WAL readers need the -shm/-wal files) but the
      # process opens the DB read-only; logs are tail-read for the activity feed.
      - ./runtime/state:/app/state
      - ./runtime/logs:/app/logs:ro
      - ./runtime/config:/app/runtime-config:ro
    ports:
      - "127.0.0.1:${AURAMAUR_WEB_PORT:-8484}:8484"
    # Deliberately NOT on the broker network: the dashboard reads a file and
    # needs no network peers. Keeping it off the subnet means it can never
    # reach ibgateway, whose API auth is trusted-IP based — the only
    # order-capable vector a compromised web container would have had. It
    # lands on the compose default network purely for the loopback publish.
    stop_grace_period: 10s

  ibgateway:
    platform: ${AURAMAUR_PLATFORM:-linux/amd64}
    image: ${IB_GATEWAY_IMAGE:-auramaur-ibgateway}:${IB_GATEWAY_VERSION:-local}
    build:
      context: deploy/ibgateway
      args:
        IB_GATEWAY_INSTALLER: ${IB_GATEWAY_INSTALLER:-ibgateway-latest-standalone-linux-x64.sh}
    restart: unless-stopped
    init: true
    environment:
      IB_GATEWAY_HEALTH_PORT: ${IB_GATEWAY_HEALTH_PORT:-4002}
      IB_GATEWAY_VNC_PASSWORD_FILE: /run/secrets/ibgateway_vnc_password
      AURAMAUR_RUNTIME_UID: ${AURAMAUR_UID:-1000}
      AURAMAUR_RUNTIME_GID: ${AURAMAUR_GID:-1000}
    volumes:
      - ./runtime/ibgateway:/home/ibgateway/Jts
      - ./secrets/ibgateway-vnc-password.txt:/run/secrets/ibgateway_vnc_password:ro
    ports:
      - "127.0.0.1:${IB_GATEWAY_NOVNC_PORT:-6080}:6080"
    networks:
      broker:
        ipv4_address: ${IB_GATEWAY_IP:-172.18.0.2}
    stop_grace_period: 2m

networks:
  broker:
    driver: bridge
    ipam:
      config:
        - subnet: ${AURAMAUR_BROKER_SUBNET:-172.18.0.0/16}
