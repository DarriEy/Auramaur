name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  safety-tests:
    name: Safety gate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Install the EXACT locked dependency set (uv.lock is committed) so CI
      # tests the same runtime the bot runs. --frozen fails if the lock drifts
      # from pyproject, which is the signal we want.
      # --extra agent installs the Hermes-bridge dep (fastmcp) so the
      # agentmcp bridge test runs for real here instead of importorskip-ing.
      - name: Install from locked dependencies
        run: uv sync --frozen --extra dev --extra agent

      # Safety gates first, fail-fast, so a triple-gate/settings regression is
      # the headline even if something else also breaks.
      - name: Run triple-gate and settings tests
        run: uv run pytest tests/test_triple_gate.py tests/test_settings.py -v

      # Then the FULL suite — CI previously ran only the two files above, so
      # every other regression guard (risk checks, execution gateway, exchange
      # adapters, strategy logic) was invisible to CI and could land on main.
      - name: Run full test suite
        run: uv run pytest -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    # Blocking: the backlog was cleared (214 -> 0) and the tree is ruff-clean, so
    # lint is now a required gate — a new violation fails the PR instead of just
    # being surfaced.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        # Pinned: an unpinned install broke every PR when ruff 0.16.0 shipped
        # new default rules (1,278 violations appeared overnight, none from
        # the PRs being gated). Upgrade deliberately: bump the pin and clear
        # the new findings in one dedicated chore PR.
        run: pip install "ruff==0.15.22"

      - name: Run ruff
        run: ruff check .
